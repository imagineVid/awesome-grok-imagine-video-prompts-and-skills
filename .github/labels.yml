# [INPUT]: Defines the review states and maintenance topics used by this repository's issues.
# [OUTPUT]: Provides the canonical label names, colors, and Grok Imagine Video-specific descriptions.
# [POS]: GitHub governance vocabulary consumed by the label synchronization workflow.
# [PROTOCOL]: 变更时更新此头部，然后检查 AGENTS.md
- name: approved
  color: '#65e00d'
  description: 'Verified Grok Imagine Video prompt ready for the public data set.'

- name: prompt-submission
  color: '#3f74ea'
  description: 'Community submission containing a reusable Grok Imagine Video prompt.'

- name: needs-review
  color: '#fbca04'
  description: 'Needs source, model-scope, media, translation, or duplicate review.'

- name: copyright
  color: '#b60205'
  description: 'Attribution correction, ownership question, or source-removal request.'

- name: bug
  color: '#d73a4a'
  description: 'Broken data, media, localization, link, or README generation.'

- name: documentation
  color: '#0075ca'
  description: 'Correction or expansion of Grok Imagine Video collection documentation.'

- name: duplicate
  color: '#cfd3d7'
  description: 'Already represented by an existing issue, source post, or prompt record.'

- name: enhancement
  color: '#a2eeef'
  description: 'Proposed improvement to collection quality or contributor workflow.'

- name: good first issue
  color: '#7057ff'
  description: 'Small, well-scoped collection task suitable for a first contribution.'

- name: help wanted
  color: '#008672'
  description: 'Maintainer input or community evidence would unblock this item.'

- name: invalid
  color: '#e99695'
  description: 'Outside model scope, unverifiable, or unsuitable for publication.'

- name: question
  color: '#d876e3'
  description: 'More source evidence or collection context is requested.'

- name: wontfix
  color: '#ffffff'
  description: 'Closed because it does not fit this collection and will not be implemented.'
